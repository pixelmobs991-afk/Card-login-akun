<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Icons - Hover Animation</title>
    <!-- Font Awesome 6 (CDN terbaru) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #262626;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        ul {
            list-style: none;
            display: flex;
            gap: 20px;
            padding: 0;
        }

        ul li a {
            width: 80px;
            height: 80px;
            background-color: #fff;
            text-align: center;
            line-height: 80px;
            font-size: 35px;
            display: block;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 3px solid #fff;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        ul li a i {
            position: relative;
            color: #262626;
            transition: transform 0.5s ease;
            z-index: 2;
        }

        /* Efek hover pada ikon */
        ul li a:hover i {
            transform: rotateY(360deg);
            color: #fff;
        }

        /* Elemen pseudo untuk latar belakang warna saat hover */
        ul li a::before {
            content: "";
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ff00; /* default transparan */
            transition: top 0.5s ease;
            z-index: 1;
        }

        ul li a:hover::before {
            top: 0;
        }

        /* Warna latar belakang untuk setiap sosial media */
        ul li:nth-child(1) a::before {
            background: #3b5999; /* Facebook */
        }

        ul li:nth-child(2) a::before {
            background: #1DA1F2; /* Twitter (warna resmi) */
        }

        ul li:nth-child(3) a::before {
            background: #0077b5; /* LinkedIn */
        }

        ul li:nth-child(4) a::before {
            background: #FF0000; /* YouTube */
        }

        /* Opsional: efek tambahan saat hover */
        ul li a:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <ul>
        <li>
            <a href="#" aria-label="Facebook">
                <i class="fab fa-facebook-f"></i>
            </a>
        </li>
        <li>
            <a href="#" aria-label="Twitter">
                <i class="fab fa-twitter"></i>
            </a>
        </li>
        <li>
            <a href="#" aria-label="LinkedIn">
                <i class="fab fa-linkedin-in"></i>
            </a>
        </li>
        <li>
            <a href="#" aria-label="YouTube">
                <i class="fab fa-youtube"></i>
            </a>
        </li>
    </ul>
</body>
</html>
